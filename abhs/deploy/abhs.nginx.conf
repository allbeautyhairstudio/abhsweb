server {
    listen 80;
    server_name allbeautyhairstudio.com www.allbeautyhairstudio.com;

    # Redirect HTTP → HTTPS (uncomment after certbot setup)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts for long-running requests (file uploads)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Static assets — let Nginx serve directly for performance
    location /_next/static/ {
        alias /var/www/abhsweb/abhs/.next/static/;
        expires 365d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    location /public/ {
        alias /var/www/abhsweb/abhs/public/;
        expires 30d;
        access_log off;
    }

    # Block direct access to sensitive paths
    location ~ ^/(data|\.env|\.git) {
        deny all;
        return 404;
    }

    # Max upload size (client photos)
    client_max_body_size 50M;
}

