<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180">
  <rect width="180" height="180" rx="36" fill="#FAF6F2"/>
  <g transform="translate(90,90)" stroke="#A0714E" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left blade -->
    <ellipse cx="-24" cy="30" rx="18" ry="22" transform="rotate(-15,-24,30)"/>
    <line x1="-16" y1="12" x2="12" y2="-44"/>
    <!-- Right blade -->
    <ellipse cx="24" cy="30" rx="18" ry="22" transform="rotate(15,24,30)"/>
    <line x1="16" y1="12" x2="-12" y2="-44"/>
    <!-- Pivot -->
    <circle cx="0" cy="-5" r="6" fill="#A0714E"/>
  </g>
</svg>
